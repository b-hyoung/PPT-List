<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PPT List — 발표 자료 모음</title>
<meta name="description" content="b-hyoung의 발표 슬라이드 모음. PPT를 골라서 바로 볼 수 있는 갤러리." />
<style>
:root{
  --bg:#0b1020; --bg2:#0f152a;
  --card:#141b31; --line:#26304d;
  --fg:#eef1fb; --muted:#9aa6c4;
  --blue:#5b8cff; --cyan:#38e1c8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  min-height:100%;
  background:
    radial-gradient(1000px 600px at 15% -10%,rgba(91,140,255,.22),transparent 60%),
    radial-gradient(900px 600px at 100% 0%,rgba(56,225,200,.14),transparent 55%),
    var(--bg);
  color:var(--fg);
  font-family:"Pretendard","Apple SD Gothic Neo","Segoe UI",system-ui,-apple-system,sans-serif;
  letter-spacing:-.01em;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:0 26px}

/* 헤더 */
header{padding:9vh 0 5vh}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
  color:var(--cyan);letter-spacing:.16em;text-transform:uppercase;margin-bottom:20px}
.eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan)}
h1{font-size:clamp(40px,7vw,86px);font-weight:800;line-height:1;letter-spacing:-.045em}
h1 .g{background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.tagline{margin-top:20px;font-size:clamp(15px,1.6vw,20px);color:var(--muted);max-width:40em}
.count{margin-top:26px;font-size:14px;color:var(--muted)}
.count b{color:var(--fg)}

/* 그리드 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:26px;padding-bottom:8vh}
.card{
  display:flex;flex-direction:column;
  background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;
  text-decoration:none;color:inherit;
  transition:transform .22s ease,border-color .22s ease,box-shadow .22s ease;
}
.card:hover{transform:translateY(-6px);border-color:var(--blue);box-shadow:0 22px 50px rgba(0,0,0,.45)}
.thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--bg2)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s ease}
.card:hover .thumb img{transform:scale(1.05)}
.thumb .open{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(11,16,32,.55);opacity:0;transition:opacity .22s ease;font-weight:700;font-size:15px;
}
.thumb .open span{background:var(--blue);color:#fff;padding:11px 22px;border-radius:30px;box-shadow:0 8px 24px rgba(91,140,255,.5)}
.card:hover .thumb .open{opacity:1}
.body{padding:22px 22px 24px;display:flex;flex-direction:column;gap:12px;flex:1}
.body h2{font-size:22px;font-weight:800;letter-spacing:-.02em}
.body p{font-size:14.5px;color:var(--muted);line-height:1.55;flex:1}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.tag{font-size:12px;font-weight:600;color:#cdd7f2;background:rgba(91,140,255,.13);
  border:1px solid rgba(91,140,255,.25);padding:5px 11px;border-radius:20px}
.meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px;
  padding-top:14px;border-top:1px solid var(--line);font-size:13px;color:var(--muted)}
.meta .go{color:var(--blue);font-weight:700}
.links{display:flex;gap:16px}
.repo{color:var(--muted);text-decoration:none;cursor:pointer}
.repo:hover{color:var(--cyan)}

footer{border-top:1px solid var(--line);padding:32px 0 48px;color:var(--muted);font-size:13.5px;
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
footer a{color:var(--muted);text-decoration:none}footer a:hover{color:var(--cyan)}

@media (max-width:560px){
  header{padding:7vh 0 4vh}
  .grid{grid-template-columns:1fr;gap:20px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow"><span class="dot"></span> b-hyoung · presentation archive</div>
    <h1>PPT <span class="g">List</span></h1>
    <p class="tagline">발표 자료를 한곳에 모았습니다. 카드를 골라 바로 슬라이드를 여세요.</p>
    <div class="count"><b id="cnt">0</b>개의 발표</div>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    <div>© <span id="yr">2026</span> b-hyoung · PPT List</div>
    <div><a href="https://github.com/b-hyoung/PPT-List" target="_blank" rel="noopener">GitHub · b-hyoung/PPT-List ↗</a></div>
  </footer>
</div>

<script>
// ── 발표 목록: 새 PPT를 추가하려면 아래 배열에 항목만 추가하세요 ──
const decks = [
  {
    title: "안심 스마트홈",
    href: "smart-care-home/",
    thumb: "smart-care-home/thumbnail.png",
    desc: "몸이 불편한 독거노인을 위한 AIoT 안전 모니터링 스마트홈 기획서. 낙상·mmWave 감지부터 자동 구급 신고, VR 시뮬레이션까지.",
    tags: ["AIoT", "스마트홈", "Unreal · VR", "캡스톤 기획서"],
    pdf: "smart-care-home/onepager.pdf",
  },
  {
    title: "Hide In AI",
    href: "hide-in-ai/",
    thumb: "hide-in-ai/thumbnail.png",
    desc: "AI 속에 숨어라 — VR 1인칭 라스트맨 스탠딩 멀티플레이 게임 발표 자료.",
    tags: ["VR", "Unity", "Meta Quest 3", "Game"],
    repo: "https://github.com/b-hyoung/HideInAI",
  },
];

const grid = document.getElementById('grid');
grid.innerHTML = decks.map(d => `
  <a class="card" href="${d.href}">
    <div class="thumb">
      <img src="${d.thumb}" alt="${d.title} 표지" loading="lazy" />
      <div class="open"><span>슬라이드 열기 →</span></div>
    </div>
    <div class="body">
      <h2>${d.title}</h2>
      <p>${d.desc}</p>
      <div class="tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="meta">
        <span class="links">
          ${d.pdf ? `<span class="repo" role="link" tabindex="0" onclick="event.preventDefault();event.stopPropagation();window.open('${d.pdf}','_blank','noopener')">요약 PDF ↓</span>` : ``}
          ${d.repo ? `<span class="repo" role="link" tabindex="0" onclick="event.preventDefault();event.stopPropagation();window.open('${d.repo}','_blank','noopener')">소스 레포 ↗</span>` : ``}
        </span>
        <span class="go">열기 →</span>
      </div>
    </div>
  </a>
`).join('');
document.getElementById('cnt').textContent = decks.length;
</script>
</body>
</html>
